<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Gigaset Infodienste Administration</title>
    <style>
        :root {
            --gigaset-orange: #ff9900;
            --gigaset-gray: #f9f9f9;
            --border-light: #e0e0e0;
            --text-main: #333;
        }

        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background: white; 
            margin: 0; 
            color: var(--text-main); 
            display: flex; 
            height: 100vh; 
        }
        
        /* Sidebar für Geräteauswahl */
        .sidebar { 
            width: 300px; 
            border-right: 1px solid var(--border-light); 
            padding: 20px; 
            background: var(--gigaset-gray); 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
        }
        
        .box-title { 
            font-size: 0.85em; 
            font-weight: 700; 
            color: #555; 
            text-transform: uppercase; 
            margin: 25px 0 10px 5px; 
            letter-spacing: 0.8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .device-link { 
            padding: 12px; 
            margin-bottom: 8px; 
            border-radius: 8px; 
            cursor: pointer; 
            border: 1px solid var(--border-light); 
            background: #fff; 
            transition: transform 0.15s, border-color 0.2s, box-shadow 0.2s; 
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .device-link:hover { 
            background: #fdfdfd; 
            border-color: #bbb;
            transform: translateY(-1px);
        }
        .device-link.active { 
            background: white; 
            border-color: var(--gigaset-orange); 
            box-shadow: 0 4px 12px rgba(255,153,0,0.12); 
        }

        /* Geräte-Bilder / Avatare */
        .device-avatar {
            width: 42px;
            height: 42px;
            border-radius: 6px;
            background: #fff;
            border: 1px solid #e8e8e8;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        .device-link.active .device-avatar {
            border-color: rgba(255,153,0,0.3);
            background: rgba(255,153,0,0.03);
        }

        .device-info {
            flex: 1;
            text-align: left;
        }

        .fw-badge {
            font-size: 0.72em;
            background: #eee;
            color: #666;
            padding: 1px 5px;
            border-radius: 3px;
            font-family: monospace;
        }
        
        .model-badge {
            display: inline-block; 
            margin-top: 4px; 
            padding: 2px 8px; 
            border-radius: 20px;
            background: rgba(255,153,0,0.12); 
            color: var(--gigaset-orange);
            font-size: 0.72em; 
            font-weight: 600; 
            letter-spacing: 0.2px;
        }

        /* Main Content */
        .container { flex: 1; padding: 60px; overflow-y: auto; text-align: center; }
        
        .header-text { max-width: 600px; margin: 0 auto 50px; font-size: 0.9em; line-height: 1.6; }
        h1 { font-weight: 400; font-size: 2em; margin-bottom: 10px; }
        .orange-line { width: 60px; height: 3px; background: var(--gigaset-orange); margin: 0 auto 30px; }

        /* Kachel Grid */
        .grid { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; margin-top: 40px; text-align: left; }
        
        .tile {
            background: var(--gigaset-gray); border: 1px solid var(--border-light); border-radius: 10px;
            width: 220px; height: 280px; padding: 20px; cursor: pointer; position: relative;
            transition: background 0.2s; display: flex; flex-direction: column; justify-content: flex-end;
        }
        .tile:hover { background: #f0f0f0; }
        .tile.active { border-color: var(--gigaset-orange); background: white; }

        /* Icons & Status */
        .status-icons { position: absolute; top: 15px; right: 15px; display: flex; gap: 8px; }
        .icon-circle { width: 22px; height: 22px; border-radius: 50%; border: 2px solid #ccc; display: flex; align-items: center; justify-content: center; font-size: 12px; color: #ccc; }
        .tile.active .icon-circle.check { background: #2ecc71; border-color: #2ecc71; color: white; }
        
        .main-icon { font-size: 40px; margin-bottom: 15px; }
        .tile-title { font-size: 1.5em; margin-bottom: 5px; }
        .tile-desc { color: var(--gigaset-orange); font-size: 0.9em; }

        /* Suche */
        .search-box { 
            background: var(--gigaset-gray); border: 1px solid var(--border-light); border-radius: 10px;
            width: 100%; max-width: 700px; margin: 40px auto; padding: 20px; display: flex; align-items: center; justify-content: space-between;
        }
        .search-box input { border: none; background: transparent; font-size: 1em; width: 90%; outline: none; }
        .search-icon { color: var(--gigaset-orange); font-size: 1.5em; cursor: pointer; }

        .location-table { display: flex; justify-content: space-between; max-width: 700px; margin: 0 auto; color: black; font-weight: bold; font-size: 0.9em; }

        .view-section { display: none; }
        .view-section.active { display: block; }
        
        .no-selection-msg { color: #888; font-style: italic; margin-top: 100px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2 style="padding: 0 5px; color: #333; font-size: 1.3em; margin-bottom: 5px;">Gigaset Admin</h2>
    <div style="font-size:0.75em; color:#888; padding: 0 5px; margin-bottom:15px;">Übersicht</div>
    <hr style="border: 0; border-top: 1px solid var(--border-light); margin-bottom: 10px;">
    <div id="device-list">Lade Geräte...</div>
</div>

<div class="container" id="main-content">
    <div class="no-selection-msg">
        <h1>Willkommen im Gigaset Admin</h1>
        <div class="orange-line"></div>
        <p>Bitte wählen Sie links ein registriertes Mobilteil aus, um die Infodienste zu konfigurieren.</p>
    </div>
</div>

<script>
    let unit = 'C';
    let currentConfig = {};
    
    // Globale Variablen für das aktuell ausgewählte Gerät
    let activeMac = '';
    let activeHs = '';

    // MAC und HSID beim ersten Laden aus der URL ziehen (falls vorhanden)
    const urlParams = new URLSearchParams(window.location.search);
    activeMac = urlParams.get('mac') || '';
    activeHs = urlParams.get('hsid') || '';

    async function initDashboard() {
        try {
            const response = await fetch(`/api/config?mac=${encodeURIComponent(activeMac)}&hsid=${encodeURIComponent(activeHs)}`);
            currentConfig = await response.json();
            
            renderSidebar(currentConfig.gateways);

            // Wenn das Mobilteil in der Config existiert, direkt aktivieren und rendern
            if (activeMac && activeHs && currentConfig.gateways[activeMac]?.handsets[activeHs]) {
                selectHandset(activeMac, activeHs);
            } else if (activeMac && activeHs) {
                const fallbackHs = currentConfig.gateways[activeMac]?.handsets[activeHs] || { city: '', mode: 'weather' };
                renderMainContent(fallbackHs);
            }
        } catch (err) {
            console.error("Fehler beim Laden des Dashboards:", err);
            document.getElementById('device-list').innerHTML = '<div style="padding:10px; color:red;">Fehler beim Laden</div>';
        }
    }

    function renderSidebar(gateways) {
        const listContainer = document.getElementById('device-list');
        let html = '';

        for (const mac of Object.keys(gateways)) {
            if (mac.length < 10) continue; 
            
            const hsMap = gateways[mac].handsets || {};
            const hsKeys = Object.keys(hsMap);
            
            if (hsKeys.length === 0) continue;

            // Box-Modell ermitteln (z. B. N510 IP PRO)
            const sampleHs = hsMap[hsKeys[0]];
            const boxModel = sampleHs?.box_model || 'Gigaset Basis';
            
            // 1. BASISSTATION (Überschrift)
            html += `
                <div class="box-title">
                    <span>🎛️</span> 
                    <span>${boxModel}</span>
                    <span style="opacity:0.5; font-size:0.85em; font-weight:normal;">(${mac.slice(-4)})</span>
                </div>`;

            // 2. MOBILTEILE DIESER BASIS
            for (const hsid of hsKeys) {
                const hs = hsMap[hsid];
                const isActive = (hsid === activeHs && mac === activeMac) ? 'active' : '';
                
                // Modellname ist der primäre Name im Fokus
                const modelName = hs.hs_model || `Mobilteil`;
                
                // Der zugeordnete Ort/Name wird zum optionalen Untertitel
                const subLabel = hs.city || '';
                
                // Dynamische Zuweisung der Icons je nach Modellname
                let avatarContent = '📞'; 
                if (modelName.toUpperCase().includes('SL750')) avatarContent = '📱'; 
                if (modelName.toUpperCase().includes('S850')) avatarContent = '📞';
                
                // Tipp für spätere echte Bilder:
                // let avatarContent = `<img src="/img/${modelName.toLowerCase().replace(/[^a-z0-9]/g, '')}.png" style="max-width:100%; max-height:100%;">`;

                html += `
                    <div class="device-link ${isActive}" id="link-${mac}-${hsid}" onclick="selectHandset('${mac}', '${hsid}')">
                        <!-- Bild / Avatar Box -->
                        <div class="device-avatar">
                            ${avatarContent}
                        </div>
                        
                        <!-- Text-Informationen -->
                        <div class="device-info">
                            <!-- Fette Hauptzeile: Das Mobilteil-Modell -->
                            <div style="font-size: 0.95em; font-weight: 700; color: #111; line-height: 1.2;">
                                ${modelName}
                            </div>
                            
                            <!-- Optionale zweite Zeile: Der Ort/Name -->
                            ${subLabel ? `
                            <div style="font-size: 0.8em; color: var(--gigaset-orange); margin-top: 2px; font-weight: 500;">
                                📍 ${subLabel}
                            </div>` : ''}
                            
                            <!-- Dritte Zeile: Firmware am unteren Rand -->
                            <div style="font-size: 0.72em; color: #999; margin-top: 6px; display: flex; justify-content: flex-end;">
                                <span class="fw-badge">FW: ${hs.box_fw || '---'}</span>
                            </div>
                        </div>
                    </div>`;
            }
        }
        listContainer.innerHTML = html || '<div style="padding:10px; color:#888;">Keine Geräte gefunden</div>';
    }

    function selectHandset(mac, hsid) {
        activeMac = mac;
        activeHs = hsid;

        document.querySelectorAll('.device-link').forEach(el => el.classList.remove('active'));
        const activeLink = document.getElementById(`link-${mac}-${hsid}`);
        if (activeLink) activeLink.classList.add('active');

        const hs = currentConfig.gateways[mac].handsets[hsid];
        renderMainContent(hs);
    }

    function renderMainContent(hs) {
        const contentContainer = document.getElementById('main-content');
        const isWeather = hs.mode === 'weather' ? 'active' : '';
        const currentCity = hs.city || '';

        contentContainer.innerHTML = `
            <div id="view-index" class="view-section active">
                <div class="header-text">Willkommen – Die Konfigurationskarte Ihres Gigaset IP-Telefons. Bitte wählen Sie hier unten die gewünschten Info-Dienste aus.</div>
                <h1>Konfiguration für ${currentCity || hs.hs_model || 'Mobilteil'}</h1>
                ${hs.hs_model ? `<div class="model-badge" style="margin-bottom:15px;">${hs.hs_model}</div>` : ''}
                <div class="orange-line"></div>
                
                <div class="grid">
                    <div class="tile ${isWeather}" onclick="showView('view-weather')">
                        <div class="status-icons">
                            <div class="icon-circle">★</div>
                            <div class="icon-circle check">✓</div>
                        </div>
                        <div class="main-icon">🌦️</div>
                        <div class="tile-title">Wetter</div>
                        <div class="tile-desc">DWD / BrightSky Live-Wetter</div>
                    </div>
                    <div class="tile" onclick="saveQuick('news')">
                        <div class="status-icons"><div class="icon-circle">★</div><div class="icon-circle">✓</div></div>
                        <div class="main-icon">📰</div>
                        <div class="tile-title">Nachrichten</div>
                        <div class="tile-desc">In Vorbereitung</div>
                    </div>
                    <div class="tile" onclick="saveQuick('zodiac')">
                        <div class="status-icons"><div class="icon-circle">★</div><div class="icon-circle">✓</div></div>
                        <div class="main-icon">♏</div>
                        <div class="tile-title">Horoskop</div>
                        <div class="tile-desc">In Vorbereitung</div>
                    </div>
                </div>
            </div>

            <div id="view-weather" class="view-section">
                <h2 style="text-align:left; max-width:700px; margin: 0 auto 20px;">Einheiten</h2>
                <div class="grid" style="justify-content: flex-start; max-width:740px; margin: 0 auto;">
                    <div class="tile active" id="tile-C" onclick="setUnit('C')" style="height:200px;">
                        <div class="status-icons"><div class="icon-circle check">✓</div></div>
                        <div class="main-icon">°C</div>
                        <div class="tile-title">Celsius</div>
                        <div class="tile-desc">Einheiten für Grad</div>
                    </div>
                    <div class="tile" id="tile-F" onclick="setUnit('F')" style="height:200px;">
                        <div class="status-icons"><div class="icon-circle check">✓</div></div>
                        <div class="main-icon">°F</div>
                        <div class="tile-title">Fahrenheit</div>
                        <div class="tile-desc">Einheiten für Grad</div>
                    </div>
                </div>

                <h2 style="text-align:left; max-width:700px; margin: 40px auto 10px;">Stadt</h2>
                <div class="search-box">
                    <input type="text" id="cityIn" value="${currentCity}" placeholder="Geben Sie die Stadt ein">
                    <span class="search-icon" onclick="saveAll()">🔍 Speichern</span>
                </div>
                <div class="location-table">
                    <span>Stadt / Ort</span>
                    <span>Region / Bundesland</span>
                    <span>Deutschland</span>
                </div>
            </div>`;
    }

    function showView(id) {
        document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    function setUnit(u) {
        unit = u;
        document.getElementById('tile-C').classList.toggle('active', u === 'C');
        document.getElementById('tile-F').classList.toggle('active', u === 'F');
    }

    function saveQuick(mode) {
        if (!activeMac || !activeHs) return alert('Bitte wählen Sie zuerst ein Mobilteil aus.');
        location.href = `/info/weather_save.jsp?mac=${activeMac}&handsetid=${activeHs}&mode=${mode}&city=Infodienste&fromAdmin=true`;
    }

    function saveAll() {
        if (!activeMac || !activeHs) return alert('Bitte wählen Sie zuerst ein Mobilteil aus.');
        const c = document.getElementById('cityIn').value;
        location.href = `/info/weather_save.jsp?mac=${activeMac}&handsetid=${activeHs}&mode=weather&city=${encodeURIComponent(c)}&unit=${unit}&fromAdmin=true`;
    }

    initDashboard();
</script>
</body>
</html>
